<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSVP Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="admin-body">
    <main class="admin-shell">
      <section class="admin-card">
        <p class="section-kicker">Admin</p>
        <h1>RSVP Dashboard</h1>
        <p class="section-copy">
          Enter the admin password to see the latest guest list.
        </p>

        <form id="admin-form" class="admin-form">
          <label>
            Password
            <input type="password" name="password" required />
          </label>
          <button type="submit">View RSVPs</button>
        </form>

        <p id="admin-status" class="form-status" aria-live="polite"></p>

        <div id="summary" class="summary-grid hidden"></div>
        <div id="results" class="results hidden"></div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
